<!DOCTYPE html>
<html lang="ko" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ARCANE SHELF V3 — 고급 AI 라이브러리</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Noto+Sans+KR:wght@300;400;700&family=JetBrains+Mono&display=swap" rel="stylesheet" />

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            display: ['Cinzel', 'serif'],
            sans: ['Noto Sans KR', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
          colors: {
            obsidian: { 900: '#050508', 800: '#0a0a0f', 700: '#12121a' },
            arcane: { gold: '#d4af37', purple: '#7c3aed' }
          }
        }
      }
    }
  </script>

  <style>
    body { background-color: #050508; color: #e2e8f0; }
    .glass-nav { background: rgba(10, 10, 15, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.05); }
    .shelf-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid rgba(255,255,255,0.03); }
    .shelf-card:hover { transform: translateY(-8px); border-color: rgba(124, 58, 237, 0.4); box-shadow: 0 20px 40px -15px rgba(0,0,0,0.5); }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: #1a1a24; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #7c3aed; }
  </style>
</head>
<body class="font-sans antialiased">

  <nav class="glass-nav sticky top-0 z-50 py-4 px-8 flex justify-between items-center">
    <div class="flex items-center gap-4">
      <div class="w-10 h-10 bg-purple-600 rounded-lg flex items-center justify-center shadow-lg shadow-purple-900/20">
        <span class="font-display font-black text-white text-xl">A</span>
      </div>
      <h1 class="font-display font-bold text-2xl tracking-tighter text-white">ARCANE <span class="text-purple-500">SHELF</span> <span class="text-[10px] bg-white/10 px-2 py-0.5 rounded ml-2">V3.0</span></h1>
    </div>
    
    <div class="flex items-center gap-6">
      <input type="text" id="search-input" placeholder="아카이브 검색..." class="bg-obsidian-700 border border-white/5 rounded-full py-2 px-6 focus:outline-none focus:border-purple-500 w-72 text-sm transition-all" />
      <button id="settings-btn" class="text-gray-400 hover:text-purple-400 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
      </button>
    </div>
  </nav>

  <div class="flex h-[calc(100vh-73px)]">
    <aside class="w-72 border-r border-white/5 p-8 overflow-y-auto bg-obsidian-800">
      <label for="file-input" class="w-full bg-purple-600 hover:bg-purple-500 text-white font-bold py-4 rounded-xl flex items-center justify-center gap-3 cursor-pointer transition-all shadow-xl shadow-purple-900/20 mb-10">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd" /></svg>
        시나리오 입고
      </label>
      <input type="file" id="file-input" class="hidden" multiple accept=".pdf" />
      <div id="filter-container" class="space-y-8"></div>
    </aside>

    <main class="flex-1 overflow-y-auto p-10 bg-obsidian-900">
      <div id="scenario-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 2xl:grid-cols-7 gap-8"></div>
    </main>
  </div>

  <div id="edit-modal" class="fixed inset-0 bg-black/90 backdrop-blur-md z-[60] hidden flex items-center justify-center p-6">
    <div class="bg-obsidian-800 border border-white/10 rounded-3xl w-full max-w-5xl h-[85vh] overflow-hidden flex shadow-2xl">
      <div class="w-80 bg-obsidian-900 p-8 border-r border-white/5 flex flex-col">
        <img id="edit-thumb" class="w-full aspect-[3/4] object-cover rounded-xl shadow-2xl mb-6" src="" />
        <button id="ai-btn" class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 py-4 rounded-xl text-sm font-bold transition-all flex items-center justify-center gap-2 shadow-lg shadow-purple-900/20">
          <span>✨ AI 전문 분석 요약</span>
        </button>
        <div class="mt-4 text-[10px] text-gray-500 text-center">전체 페이지의 텍스트를 추출하여 분석합니다.<br>대용량 파일은 시간이 걸릴 수 있습니다.</div>
      </div>
      
      <div class="flex-1 p-10 overflow-y-auto">
        <div class="flex justify-between items-start mb-8">
          <h2 class="text-3xl font-bold font-display tracking-tight" id="edit-title-display">Scenario Detail</h2>
          <button onclick="closeEdit()" class="text-gray-500 hover:text-white text-2xl">&times;</button>
        </div>
        
        <div class="grid grid-cols-2 gap-8 mb-8">
          <div class="space-y-6">
            <div>
              <label class="text-[10px] uppercase tracking-widest text-purple-400 font-bold mb-2 block">System</label>
              <input type="text" id="edit-rule" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:border-purple-500 outline-none" />
            </div>
            <div>
              <label class="text-[10px] uppercase tracking-widest text-purple-400 font-bold mb-2 block">Author</label>
              <input type="text" id="edit-author" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:border-purple-500 outline-none" />
            </div>
          </div>
          <div class="space-y-6">
            <div>
              <label class="text-[10px] uppercase tracking-widest text-purple-400 font-bold mb-2 block">Players</label>
              <input type="text" id="edit-players" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:border-purple-500 outline-none" />
            </div>
            <div>
              <label class="text-[10px] uppercase tracking-widest text-purple-400 font-bold mb-2 block">Tags</label>
              <input type="text" id="edit-tags" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:border-purple-500 outline-none" />
            </div>
          </div>
        </div>

        <div class="mb-8">
          <label class="text-[10px] uppercase tracking-widest text-purple-400 font-bold mb-2 block">Summary</label>
          <textarea id="edit-summary" rows="8" class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 focus:border-purple-500 outline-none resize-none leading-relaxed text-gray-300"></textarea>
        </div>
        
        <div class="flex gap-4">
          <button id="save-edit-btn" class="flex-1 bg-white text-black hover:bg-gray-200 py-4 rounded-xl font-bold transition-all">설정 저장</button>
          <button id="open-pdf-btn" class="flex-1 bg-obsidian-700 hover:bg-obsidian-600 border border-white/10 py-4 rounded-xl font-bold transition-all">PDF 읽기</button>
        </div>
      </div>
    </div>
  </div>

  <div id="settings-modal" class="fixed inset-0 bg-black/95 backdrop-blur-xl z-[70] hidden flex items-center justify-center p-6">
    <div class="bg-obsidian-800 border border-white/10 rounded-3xl w-full max-w-2xl p-10 shadow-2xl">
      <div class="flex justify-between items-center mb-8">
        <h2 class="text-2xl font-bold font-display">AI Configuration</h2>
        <button onclick="closeSettings()" class="text-gray-500 hover:text-white">&times;</button>
      </div>

      <div class="space-y-6">
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-xs text-gray-500 uppercase tracking-widest mb-2">Provider</label>
            <select id="api-provider" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:border-purple-500 outline-none">
              <option value="gemini">Google Gemini</option>
              <option value="openai">OpenAI ChatGPT</option>
              <option value="anthropic">Anthropic Claude</option>
            </select>
          </div>
          <div>
            <label class="block text-xs text-gray-500 uppercase tracking-widest mb-2">Model Name</label>
            <input type="text" id="api-model" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:border-purple-500 outline-none" placeholder="gemini-1.5-pro" />
          </div>
        </div>

        <div>
          <label class="block text-xs text-gray-500 uppercase tracking-widest mb-2">API Key</label>
          <input type="password" id="api-key-input" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:border-purple-500 outline-none" placeholder="키를 입력하세요..." />
        </div>

        <div>
          <label class="block text-xs text-gray-500 uppercase tracking-widest mb-2">Custom Summary Prompt</label>
          <textarea id="api-prompt" rows="4" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:border-purple-500 outline-none resize-none text-sm" placeholder="예: 이 TRPG 시나리오의 전체 내용을 분석해서 줄거리와 주요 NPC, 엔딩 분기를 요약해줘."></textarea>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-xs text-gray-500 uppercase tracking-widest mb-2">Target Summary Length (Chars)</label>
            <input type="number" id="api-length" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:border-purple-500 outline-none" value="500" />
          </div>
          <div class="flex items-end">
            <button id="save-settings-btn" class="w-full bg-purple-600 hover:bg-purple-500 py-3 rounded-xl font-bold shadow-lg shadow-purple-900/20">설정 저장</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 px-8 py-4 rounded-2xl bg-white text-black font-bold shadow-2xl z-[100] transition-all opacity-0 pointer-events-none scale-90"></div>

  <script>
    let db, scenarios = [], currentEditId = null;
    const DB_NAME = 'arcane-shelf-v3';
    const STORE_NAME = 'scenarios';

    async function openDB() {
      return new Promise((resolve) => {
        const req = indexedDB.open(DB_NAME, 1);
        req.onupgradeneeded = (e) => e.target.result.createObjectStore(STORE_NAME, { keyPath: 'id' });
        req.onsuccess = (e) => resolve(e.target.result);
      });
    }

    async function dbSave(item) {
      const tx = db.transaction(STORE_NAME, 'readwrite');
      tx.objectStore(STORE_NAME).put(item);
      return new Promise(r => tx.oncomplete = r);
    }

    async function dbGetAll() {
      const tx = db.transaction(STORE_NAME, 'readonly');
      const req = tx.objectStore(STORE_NAME).getAll();
      return new Promise(r => req.onsuccess = () => r(req.result));
    }

    async function handleFiles(files) {
      if (!files.length) return;
      showToast(`${files.length}개의 고서를 확인 중...`);
      for (const file of files) {
        try {
          const id = crypto.randomUUID();
          const arrayBuffer = await file.arrayBuffer();
          const pdf = await pdfjsLib.getDocument({ data: new Uint8Array(arrayBuffer) }).promise;
          const page = await pdf.getPage(1);
          const viewport = page.getViewport({ scale: 0.6 });
          const canvas = document.createElement('canvas');
          const ctx = canvas.getContext('2d');
          canvas.height = viewport.height; canvas.width = viewport.width;
          await page.render({ canvasContext: ctx, viewport }).promise;

          const scenario = {
            id, title: file.name.replace('.pdf', ''), rule: 'Unknown', author: '', players: '', tags: [], summary: '',
            thumbnail: canvas.toDataURL('image/jpeg', 0.8),
            pdfData: 'data:application/pdf;base64,' + btoa(new Uint8Array(arrayBuffer).reduce((d, b) => d + String.fromCharCode(b), '')),
            addedAt: Date.now()
          };
          await dbSave(scenario);
          scenarios.unshift(scenario);
          renderGrid(); renderSidebar();
        } catch (e) { showToast(`실패: ${file.name}`, 'error'); }
      }
      showToast('입고가 완료되었습니다.', 'success');
    }

    async function generateAISummary(id) {
      const config = {
        key: localStorage.getItem('arcane_key'),
        provider: localStorage.getItem('arcane_provider') || 'gemini',
        model: localStorage.getItem('arcane_model') || 'gemini-1.5-pro',
        prompt: localStorage.getItem('arcane_prompt') || '이 시나리오의 줄거리와 주요 특징을 요약해줘.',
        length: localStorage.getItem('arcane_length') || 500
      };

      if (!config.key) { showToast('API 키가 없습니다.', 'error'); return openSettings(); }
      const sc = scenarios.find(s => s.id === id);
      showToast('전문 텍스트를 추출하는 중...');

      try {
        const pdfData = dataURLtoBlob(sc.pdfData);
        const arrayBuffer = await pdfData.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({ data: new Uint8Array(arrayBuffer) }).promise;
        let fullText = "";
        for (let i = 1; i <= pdf.numPages; i++) {
          const page = await pdf.getPage(i);
          const textContent = await page.getTextContent();
          fullText += textContent.items.map(it => it.str).join(' ') + "\\n";
          if (fullText.length > 30000) break;
        }
        showToast('AI가 고서를 읽고 있습니다...');
        const finalPrompt = `${config.prompt}\\n\\n결과물 길이는 약 ${config.length}자 정도로 작성해줘.\\n\\n내용:\\n${fullText}`;
        let resultSummary = "";

        if (config.provider === 'gemini') {
          const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${config.model}:generateContent?key=${config.key}`, {
            method: 'POST',
            body: JSON.stringify({ contents: [{ parts: [{ text: finalPrompt }] }] })
          });
          const data = await resp.json();
          resultSummary = data.candidates[0].content.parts[0].text;
        } else if (config.provider === 'openai') {
          const resp = await fetch(`https://api.openai.com/v1/chat/completions`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${config.key}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ model: config.model, messages: [{ role: 'user', content: finalPrompt }] })
          });
          const data = await resp.json();
          resultSummary = data.choices[0].message.content;
        }

        document.getElementById('edit-summary').value = resultSummary;
        showToast('분석이 완료되었습니다.', 'success');
      } catch (err) {
        showToast('AI 분석 실패. API 설정을 확인하세요.', 'error');
      }
    }

    function renderGrid() {
      const grid = document.getElementById('scenario-grid');
      const term = document.getElementById('search-input').value.toLowerCase();
      const filtered = scenarios.filter(s => s.title.toLowerCase().includes(term));
      grid.innerHTML = filtered.map(s => `
        <div class="shelf-card group cursor-pointer" onclick="openEdit('${s.id}')">
          <div class="relative aspect-[3/4] overflow-hidden rounded-2xl bg-obsidian-700">
            <img src="${s.thumbnail}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" />
            <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-transparent to-transparent flex flex-col justify-end p-5 opacity-0 group-hover:opacity-100 transition-opacity">
               <p class="text-[9px] text-purple-400 font-bold uppercase tracking-widest mb-1">${s.rule}</p>
               <h3 class="text-white font-bold text-sm leading-tight">${s.title}</h3>
            </div>
          </div>
        </div>
      `).join('');
    }

    function renderSidebar() {
      const container = document.getElementById('filter-container');
      const rules = ['All', ...new Set(scenarios.map(s => s.rule))];
      container.innerHTML = `
        <div>
          <h4 class="text-[10px] uppercase tracking-[0.2em] text-gray-500 mb-4 font-bold">System Filter</h4>
          <div class="flex flex-col gap-2">
            ${rules.map(r => `<button class="text-left text-sm py-2 px-3 rounded-lg hover:bg-white/5 transition-all text-gray-400 hover:text-white">${r}</button>`).join('')}
          </div>
        </div>
      `;
    }

    function openEdit(id) {
      currentEditId = id;
      const s = scenarios.find(item => item.id === id);
      document.getElementById('edit-title-display').innerText = s.title;
      document.getElementById('edit-thumb').src = s.thumbnail;
      document.getElementById('edit-rule').value = s.rule;
      document.getElementById('edit-author').value = s.author;
      document.getElementById('edit-players').value = s.players;
      document.getElementById('edit-tags').value = s.tags.join(', ');
      document.getElementById('edit-summary').value = s.summary;
      document.getElementById('open-pdf-btn').onclick = () => openPDF(id);
      document.getElementById('ai-btn').onclick = () => generateAISummary(id);
      document.getElementById('edit-modal').classList.remove('hidden');
    }

    function closeEdit() { document.getElementById('edit-modal').classList.add('hidden'); }
    
    async function saveEdit() {
      const idx = scenarios.findIndex(s => s.id === currentEditId);
      scenarios[idx].rule = document.getElementById('edit-rule').value;
      scenarios[idx].author = document.getElementById('edit-author').value;
      scenarios[idx].players = document.getElementById('edit-players').value;
      scenarios[idx].tags = document.getElementById('edit-tags').value.split(',').map(t => t.trim()).filter(t => t);
      scenarios[idx].summary = document.getElementById('edit-summary').value;
      await dbSave(scenarios[idx]);
      renderGrid(); renderSidebar(); closeEdit();
      showToast('아카이브가 업데이트되었습니다.');
    }

    function openSettings() {
      document.getElementById('api-key-input').value = localStorage.getItem('arcane_key') || '';
      document.getElementById('api-provider').value = localStorage.getItem('arcane_provider') || 'gemini';
      document.getElementById('api-model').value = localStorage.getItem('arcane_model') || 'gemini-1.5-pro';
      document.getElementById('api-prompt').value = localStorage.getItem('arcane_prompt') || '이 시나리오의 줄거리와 주요 특징을 요약해줘.';
      document.getElementById('api-length').value = localStorage.getItem('arcane_length') || 500;
      document.getElementById('settings-modal').classList.remove('hidden');
    }

    function closeSettings() { document.getElementById('settings-modal').classList.add('hidden'); }

    function saveSettings() {
      localStorage.setItem('arcane_key', document.getElementById('api-key-input').value);
      localStorage.setItem('arcane_provider', document.getElementById('api-provider').value);
      localStorage.setItem('arcane_model', document.getElementById('api-model').value);
      localStorage.setItem('arcane_prompt', document.getElementById('api-prompt').value);
      localStorage.setItem('arcane_length', document.getElementById('api-length').value);
      closeSettings();
      showToast('마법 설정이 저장되었습니다.', 'success');
    }

    function openPDF(id) {
      const sc = scenarios.find(s => s.id === id);
      const url = URL.createObjectURL(dataURLtoBlob(sc.pdfData));
      window.open(url, '_blank');
      setTimeout(() => URL.revokeObjectURL(url), 60000);
    }

    function dataURLtoBlob(dataurl) {
      const arr = dataurl.split(','), mime = arr[0].match(/:(.*?);/)[1],
            bstr = atob(arr[1]); let n = bstr.length, u8arr = new Uint8Array(n);
      while(n--) u8arr[n] = bstr.charCodeAt(n);
      return new Blob([u8arr], {type:mime});
    }

    function showToast(msg, type = 'info') {
      const t = document.getElementById('toast');
      t.innerText = msg;
      t.className = `fixed bottom-10 left-1/2 -translate-x-1/2 px-8 py-4 rounded-2xl font-bold shadow-2xl z-[100] transition-all duration-500 opacity-100 scale-100 `;
      if(type === 'error') t.classList.add('bg-red-500', 'text-white');
      else if(type === 'success') t.classList.add('bg-purple-600', 'text-white');
      else t.classList.add('bg-white', 'text-black');
      setTimeout(() => { t.classList.replace('opacity-100', 'opacity-0'); t.classList.replace('scale-100', 'scale-90'); }, 3000);
    }

    document.getElementById('file-input').addEventListener('change', (e) => handleFiles(e.target.files));
    document.getElementById('search-input').addEventListener('input', renderGrid);
    document.getElementById('settings-btn').addEventListener('click', openSettings);
    document.getElementById('save-settings-btn').addEventListener('click', saveSettings);
    document.getElementById('save-edit-btn').addEventListener('click', saveEdit);

    (async () => {
      db = await openDB();
      scenarios = await dbGetAll();
      scenarios.sort((a,b) => b.addedAt - a.addedAt);
      renderGrid(); renderSidebar();
    })();
  </script>
</body>
</html>
