  <!-- TOAST -->
  <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 px-6 py-3 rounded-full bg-white text-black font-bold shadow-2xl z-[100] transition-all opacity-0 pointer-events-none"></div>

  <script>
    // ─────────────────────────────────────────────────────────────
    // DATABASE & STATE
    let db;
    let scenarios = [];
    let currentEditId = null;
    let filterState = {
      rule: 'all',
      tag: 'all',
      search: ''
    };

    const DB_NAME = 'arcane-shelf-v2';
    const STORE_NAME = 'scenarios';

    async function openDB() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, 1);
        request.onupgradeneeded = (e) => {
          const db = e.target.result;
          if (!db.objectStoreNames.contains(STORE_NAME)) {
            db.createObjectStore(STORE_NAME, { keyPath: 'id' });
          }
        };
        request.onsuccess = (e) => resolve(e.target.result);
        request.onerror = (e) => reject(e.target.error);
      });
    }

    async function dbSave(item) {
      const tx = db.transaction(STORE_NAME, 'readwrite');
      tx.objectStore(STORE_NAME).put(item);
      return new Promise((r, j) => { tx.oncomplete = r; tx.onerror = j; });
    }

    async function dbGetAll() {
      const tx = db.transaction(STORE_NAME, 'readonly');
      const store = tx.objectStore(STORE_NAME);
      const request = store.getAll();
      return new Promise((r, j) => { request.onsuccess = () => r(request.result); request.onerror = j; });
    }

    async function dbClear() {
      const tx = db.transaction(STORE_NAME, 'readwrite');
      tx.objectStore(STORE_NAME).clear();
      return new Promise(r => tx.oncomplete = r);
    }

    // ─────────────────────────────────────────────────────────────
    // PDF LOGIC
    async function handleFiles(files) {
      if (!files.length) return;
      showToast(`${files.length}개의 파일을 처리 중...`, 'info');
      
      for (const file of files) {
        if (file.type !== 'application/pdf') continue;
        
        try {
          const id = crypto.randomUUID();
          const arrayBuffer = await file.arrayBuffer();
          const base64Pdf = arrayBufferToBase64(arrayBuffer);
          
          // PDFJS
          const pdfData = new Uint8Array(arrayBuffer);
          const pdf = await pdfjsLib.getDocument({ data: pdfData }).promise;
          const page = await pdf.getPage(1);
          
          // Thumbnail
          const viewport = page.getViewport({ scale: 0.5 });
          const canvas = document.createElement('canvas');
          const context = canvas.getContext('2d');
          canvas.height = viewport.height;
          canvas.width = viewport.width;
          await page.render({ canvasContext: context, viewport }).promise;
          const thumbnail = canvas.toDataURL('image/jpeg', 0.8);

          // Text extraction for AI
          let extractedText = "";
          const pagesToExtract = Math.min(3, pdf.numPages);
          for (let i = 1; i <= pagesToExtract; i++) {
            const p = await pdf.getPage(i);
            const content = await p.getTextContent();
            extractedText += content.items.map(it => it.str).join(" ") + "\n";
          }

          const scenario = {
            id,
            title: file.name.replace('.pdf', ''),
            filename: file.name,
            rule: 'Unknown',
            author: '',
            players: '',
            tags: [],
            summary: '',
            thumbnail,
            extractedText: extractedText.substring(0, 4000),
            pdfData: 'data:application/pdf;base64,' + base64Pdf,
            addedAt: Date.now()
          };

          await dbSave(scenario);
          scenarios.unshift(scenario);
          renderGrid();
          renderSidebar();
        } catch (err) {
          console.error(err);
          showToast(`파일 처리 실패: ${file.name}`, 'error');
        }
      }
      showToast('완료되었습니다', 'success');
    }

    function arrayBufferToBase64(buffer) {
      let binary = '';
      const bytes = new Uint8Array(buffer);
      const len = bytes.byteLength;
      for (let i = 0; i < len; i++) {
        binary += String.fromCharCode(bytes[i]);
      }
      return window.btoa(binary);
    }

    // ─────────────────────────────────────────────────────────────
    // RENDER LOGIC
    function renderGrid() {
      const grid = document.getElementById('scenario-grid');
      const empty = document.getElementById('empty-state');
      
      const filtered = scenarios.filter(s => {
        const matchRule = filterState.rule === 'all' || s.rule === filterState.rule;
        const matchTag = filterState.tag === 'all' || s.tags.includes(filterState.tag);
        const matchSearch = !filterState.search || 
                            s.title.toLowerCase().includes(filterState.search.toLowerCase()) ||
                            s.author.toLowerCase().includes(filterState.search.toLowerCase());
        return matchRule && matchTag && matchSearch;
      });

      if (scenarios.length === 0) {
        grid.innerHTML = '';
        empty.classList.remove('hidden');
        return;
      }
      
      empty.classList.add('hidden');
      grid.innerHTML = filtered.map(s => `
        <div class="shelf-card group cursor-pointer" onclick="openEdit('${s.id}')">
          <div class="relative aspect-[3/4] overflow-hidden rounded-xl bg-obsidian-700 border border-white/5">
            <img src="${s.thumbnail}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500" />
            <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity flex flex-col justify-end p-4">
              <span class="text-[10px] uppercase tracking-tighter text-purple-300 font-bold">${s.rule}</span>
            </div>
          </div>
          <div class="mt-3">
            <h3 class="font-bold text-sm truncate text-gray-200">${s.title}</h3>
            <p class="text-xs text-gray-500 truncate">${s.author || '저자 미상'}</p>
          </div>
        </div>
      `).join('');
    }

    function renderSidebar() {
      const container = document.getElementById('filter-container');
      const rules = ['all', ...new Set(scenarios.map(s => s.rule))];
      const tags = ['all', ...new Set(scenarios.flatMap(s => s.tags))];

      container.innerHTML = `
        <div class="mb-6">
          <h4 class="text-[10px] uppercase tracking-widest text-gray-500 mb-3">시스템 분류</h4>
          <div class="flex flex-col gap-1">
            ${rules.map(r => `
              <button onclick="setFilter('rule', '${r}')" class="text-left text-sm py-1 px-2 rounded hover:bg-white/5 transition-colors ${filterState.rule === r ? 'text-purple-400 font-bold bg-white/5' : 'text-gray-400'}">
                ${r === 'all' ? '전체 보기' : r}
              </button>
            `).join('')}
          </div>
        </div>
        <div>
          <h4 class="text-[10px] uppercase tracking-widest text-gray-500 mb-3">태그 클라우드</h4>
          <div class="flex flex-wrap gap-2">
            ${tags.map(t => `
              <button onclick="setFilter('tag', '${t}')" class="text-[10px] px-2 py-1 rounded border ${filterState.tag === t ? 'border-purple-500 text-purple-400 bg-purple-500/10' : 'border-white/10 text-gray-500 hover:border-white/30'}">
                #${t === 'all' ? '전체' : t}
              </button>
            `).join('')}
          </div>
        </div>
      `;
    }

    function setFilter(key, val) {
      filterState[key] = val;
      renderGrid();
      renderSidebar();
    }

    // ─────────────────────────────────────────────────────────────
    // MODAL & ACTION LOGIC
    function openEdit(id) {
      currentEditId = id;
      const s = scenarios.find(item => item.id === id);
      if (!s) return;

      document.getElementById('edit-title-display').innerText = s.title;
      document.getElementById('edit-thumb').src = s.thumbnail;
      document.getElementById('edit-rule').value = s.rule;
      document.getElementById('edit-author').value = s.author;
      document.getElementById('edit-players').value = s.players;
      document.getElementById('edit-tags').value = s.tags.join(', ');
      document.getElementById('edit-summary').value = s.summary;

      document.getElementById('open-pdf-btn').onclick = () => openPDF(s.id);
      document.getElementById('ai-btn').onclick = () => generateAISummary(s.id);

      document.getElementById('edit-modal').classList.remove('hidden');
    }

    function closeEdit() {
      document.getElementById('edit-modal').classList.add('hidden');
      currentEditId = null;
    }

    async function saveEdit() {
      const idx = scenarios.findIndex(s => s.id === currentEditId);
      if (idx === -1) return;

      scenarios[idx].rule = document.getElementById('edit-rule').value;
      scenarios[idx].author = document.getElementById('edit-author').value;
      scenarios[idx].players = document.getElementById('edit-players').value;
      scenarios[idx].tags = document.getElementById('edit-tags').value.split(',').map(t => t.trim()).filter(t => t);
      scenarios[idx].summary = document.getElementById('edit-summary').value;

      await dbSave(scenarios[idx]);
      renderGrid();
      renderSidebar();
      closeEdit();
      showToast('정보가 업데이트되었습니다', 'success');
    }

    // ─────────────────────────────────────────────────────────────
    // FIX: Updated openPDF function using Blob URL for stability
    function openPDF(id) {
      const sc = scenarios.find(s => s.id === id);
      if (!sc || !sc.pdfData) { 
        showToast('PDF 데이터를 찾을 수 없습니다', 'error'); 
        return; 
      }

      try {
        // 1. Convert Base64(Data URL) to a Blob object
        const blob = dataURLtoBlob(sc.pdfData);
        
        // 2. Create a temporary URL for the browser to open
        const url = URL.createObjectURL(blob);
        
        // 3. Open in a new tab (uses native PDF viewer)
        const win = window.open(url, '_blank');
        
        if (!win) {
          showToast('팝업이 차단되었습니다. 팝업 허용을 해주세요.', 'error');
        }

        // 4. Memory management: Revoke URL after a minute
        setTimeout(() => URL.revokeObjectURL(url), 60000);
        
      } catch (err) {
        console.error('PDF 열기 실패:', err);
        showToast('PDF를 여는 중 오류가 발생했습니다.', 'error');
      }
    }

    // Helper: Base64 to Blob
    function dataURLtoBlob(dataurl) {
      const arr = dataurl.split(',');
      const mime = arr[0].match(/:(.*?);/)[1];
      const bstr = atob(arr[1]);
      let n = bstr.length;
      const u8arr = new Uint8Array(n);
      while (n--) {
        u8arr[n] = bstr.charCodeAt(n);
      }
      return new Blob([u8arr], { type: mime });
    }

    // AI Summary placeholder logic
    async function generateAISummary(id) {
      const apiKey = localStorage.getItem('arcane_api_key');
      if (!apiKey) {
        showToast('API 키를 먼저 설정해 주세요', 'error');
        openSettings();
        return;
      }
      
      const sc = scenarios.find(s => s.id === id);
      showToast('AI가 시나리오를 분석 중입니다...', 'info');
      
      // Actual implementation would call Gemini/OpenAI API here
      // For now, let's pretend and just update local state
      setTimeout(() => {
        const result = "이 시나리오는 폐쇄된 저택에서 벌어지는 미스터리 스릴러입니다. 플레이어들은 실종된 저택의 주인을 찾기 위해 흩어진 단서를 조합해야 하며, 자정에 숨겨진 진실이 밝혀집니다.";
        document.getElementById('edit-summary').value = result;
        showToast('AI 요약이 완료되었습니다', 'success');
      }, 2000);
    }

    // ─────────────────────────────────────────────────────────────
    // SETTINGS
    function openSettings() {
      document.getElementById('api-key-input').value = localStorage.getItem('arcane_api_key') || '';
      document.getElementById('api-provider').value = localStorage.getItem('arcane_api_provider') || 'gemini';
      document.getElementById('settings-modal').classList.remove('hidden');
    }

    function closeSettings() {
      document.getElementById('settings-modal').classList.add('hidden');
    }

    function saveSettings() {
      const key = document.getElementById('api-key-input').value;
      const provider = document.getElementById('api-provider').value;
      localStorage.setItem('arcane_api_key', key);
      localStorage.setItem('arcane_api_provider', provider);
      closeSettings();
      showToast('설정이 저장되었습니다', 'success');
    }

    function loadSettings() {
      // Logic for initial load if needed
    }

    // ─────────────────────────────────────────────────────────────
    // UTILS
    function showToast(msg, type = 'info') {
      const t = document.getElementById('toast');
      t.innerText = msg;
      t.className = `fixed bottom-8 left-1/2 -translate-x-1/2 px-6 py-3 rounded-full font-bold shadow-2xl z-[100] transition-all duration-300 opacity-100 `;
      
      if (type === 'error') t.classList.add('bg-red-600', 'text-white');
      else if (type === 'success') t.classList.add('bg-green-600', 'text-white');
      else t.classList.add('bg-white', 'text-black');

      setTimeout(() => {
        t.style.opacity = '0';
      }, 3000);
    }

    function setupDropZone() {
      const zone = document.body;
      zone.addEventListener('dragover', (e) => { e.preventDefault(); zone.classList.add('bg-purple-900/5'); });
      zone.addEventListener('dragleave', () => zone.classList.remove('bg-purple-900/5'));
      zone.addEventListener('drop', (e) => {
        e.preventDefault();
        zone.classList.remove('bg-purple-900/5');
        handleFiles(e.dataTransfer.files);
      });
    }

    // Event Listeners
    document.getElementById('file-input').addEventListener('change', (e) => handleFiles(e.target.files));
    document.getElementById('empty-file-input').addEventListener('change', (e) => handleFiles(e.target.files));
    document.getElementById('search-input').addEventListener('input', (e) => {
      filterState.search = e.target.value;
      renderGrid();
    });
    document.getElementById('settings-btn').addEventListener('click', openSettings);
    document.getElementById('save-settings-btn').addEventListener('click', saveSettings);
    document.getElementById('save-edit-btn').addEventListener('click', saveEdit);
    document.getElementById('toggle-key-vis').addEventListener('click', () => {
      const inp = document.getElementById('api-key-input');
      inp.type = inp.type === 'password' ? 'text' : 'password';
    });
    document.getElementById('clear-db-btn').addEventListener('click', async () => {
      if (!confirm('모든 시나리오를 삭제합니다. 이 작업은 되돌릴 수 없습니다.')) return;
      await dbClear();
      scenarios = [];
      closeSettings();
      renderGrid();
      renderSidebar();
      showToast('라이브러리가 초기화되었습니다', 'success');
    });

    // INIT
    async function init() {
      db = await openDB();
      scenarios = await dbGetAll();
      scenarios.sort((a, b) => b.addedAt - a.addedAt);
      loadSettings();
      setupDropZone();
      renderGrid();
      renderSidebar();
    }

    init().catch(err => {
      console.error('Initialization failed:', err);
      showToast('초기화 중 오류가 발생했습니다', 'error');
    });
  </script>
</body>
