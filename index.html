<!DOCTYPE html>
<html lang="ko" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ARCANE SHELF V3.3 — 프리미엄 시나리오 아카이브</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Noto+Sans+KR:wght@300;400;700&family=JetBrains+Mono&display=swap" rel="stylesheet" />

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            display: ['Cinzel', 'serif'],
            sans: ['Noto Sans KR', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
          colors: {
            obsidian: { 900: '#050508', 800: '#0a0a0f', 700: '#12121a' },
            arcane: { gold: '#d4af37', purple: '#7c3aed' }
          }
        }
      }
    }
  </script>

  <style>
    body { background-color: #050508; color: #e2e8f0; overflow: hidden; }
    .glass-nav { background: rgba(10, 10, 15, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.05); }
    .shelf-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid rgba(255,255,255,0.03); }
    .shelf-card:hover { transform: translateY(-8px); border-color: rgba(124, 58, 237, 0.4); box-shadow: 0 20px 40px -15px rgba(0,0,0,0.5); }
    
    /* 마크다운 스타일링 */
    .markdown-body { font-size: 0.95rem; line-height: 1.7; color: #cbd5e1; }
    .markdown-body h1, .markdown-body h2, .markdown-body h3 { color: #fff; font-weight: 700; margin-top: 1.5rem; margin-bottom: 0.75rem; border-bottom: 1px solid #334155; padding-bottom: 0.3rem; }
    .markdown-body p { margin-bottom: 1rem; }
    .markdown-body table { width: 100%; border-collapse: collapse; margin-bottom: 1rem; background: rgba(255,255,255,0.03); border-radius: 8px; overflow: hidden; }
    .markdown-body th, .markdown-body td { border: 1px solid #334155; padding: 10px 14px; text-align: left; }
    .markdown-body th { background: rgba(124, 58, 237, 0.1); color: #a78bfa; font-size: 0.8rem; text-transform: uppercase; }
    .markdown-body blockquote { border-left: 4px solid #7c3aed; padding-left: 1rem; color: #94a3b8; font-style: italic; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: #1a1a24; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #7c3aed; }
  </style>
</head>
<body class="font-sans antialiased">

  <nav class="glass-nav sticky top-0 z-50 py-4 px-8 flex justify-between items-center">
    <div class="flex items-center gap-4">
      <div class="w-10 h-10 bg-purple-600 rounded-lg flex items-center justify-center shadow-lg shadow-purple-900/20">
        <span class="font-display font-black text-white text-xl">A</span>
      </div>
      <h1 class="font-display font-bold text-2xl tracking-tighter text-white">ARCANE <span class="text-purple-500">SHELF</span> <span class="text-[10px] bg-white/10 px-2 py-0.5 rounded ml-2">V3.3</span></h1>
    </div>
    <div class="flex items-center gap-6">
      <input type="text" id="search-input" placeholder="아카이브 검색..." class="bg-obsidian-700 border border-white/5 rounded-full py-2 px-6 focus:outline-none focus:border-purple-500 w-72 text-sm transition-all" />
      <button id="settings-btn" class="text-gray-400 hover:text-purple-400">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
      </button>
    </div>
  </nav>

  <div class="flex h-[calc(100vh-73px)]">
    <aside class="w-72 border-r border-white/5 p-8 bg-obsidian-800 overflow-y-auto">
      <label for="file-input" class="w-full bg-purple-600 hover:bg-purple-500 text-white font-bold py-4 rounded-xl flex items-center justify-center gap-3 cursor-pointer transition-all shadow-xl shadow-purple-900/20 mb-10">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd" /></svg>
        시나리오 입고
      </label>
      <input type="file" id="file-input" class="hidden" multiple accept=".pdf" />
      
      <div id="sidebar-filters" class="space-y-8">
        </div>
    </aside>

    <main class="flex-1 overflow-y-auto p-10 bg-obsidian-900">
      <div id="scenario-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 2xl:grid-cols-7 gap-8"></div>
    </main>
  </div>

  <div id="edit-modal" class="fixed inset-0 bg-black/95 backdrop-blur-md z-[60] hidden flex items-center justify-center p-6">
    <div class="bg-obsidian-800 border border-white/10 rounded-3xl w-full max-w-6xl h-[90vh] overflow-hidden flex shadow-2xl">
      <div class="w-80 bg-obsidian-900 p-8 border-r border-white/5 flex flex-col items-center">
        <img id="edit-thumb" class="w-full aspect-[3/4] object-cover rounded-xl shadow-2xl mb-6 bg-obsidian-700" src="" />
        <button id="ai-btn" class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 py-4 rounded-xl text-sm font-bold transition-all shadow-lg shadow-purple-900/20 mb-4">✨ AI 서적 큐레이팅</button>
        <div class="text-[10px] text-gray-500 text-center leading-relaxed">설정된 프롬프트에 따라 마크다운 형식을 포함한 전문 분석을 수행합니다.</div>
      </div>
      
      <div class="flex-1 p-10 overflow-y-auto">
        <div class="flex justify-between items-start mb-6">
          <div class="flex-1 mr-4">
            <label class="text-[10px] uppercase text-purple-400 font-bold mb-1 block">Scenario Title</label>
            <input type="text" id="edit-title" class="w-full bg-transparent text-3xl font-bold font-display tracking-tight border-b border-transparent focus:border-purple-500 outline-none pb-1" />
          </div>
          <button onclick="closeEdit()" class="text-gray-500 hover:text-white text-2xl">&times;</button>
        </div>
        
        <div class="grid grid-cols-2 gap-6 mb-6">
          <div class="space-y-4">
            <div><label class="text-[10px] uppercase text-gray-500 font-bold mb-1 block">Rule System</label><input type="text" id="edit-rule" class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2 outline-none" /></div>
            <div><label class="text-[10px] uppercase text-gray-500 font-bold mb-1 block">Author</label><input type="text" id="edit-author" class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2 outline-none" /></div>
          </div>
          <div class="space-y-4">
            <div><label class="text-[10px] uppercase text-gray-500 font-bold mb-1 block">Players</label><input type="text" id="edit-players" class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2 outline-none" /></div>
            <div><label class="text-[10px] uppercase text-gray-500 font-bold mb-1 block">Tags (쉼표 구분)</label><input type="text" id="edit-tags" class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2 outline-none" /></div>
          </div>
        </div>

        <div class="mb-8">
          <div class="flex justify-between items-end mb-2">
            <label class="text-[10px] uppercase text-purple-400 font-bold block">Scenario Curation & Summary</label>
            <button onclick="toggleSummaryMode()" id="toggle-summary-btn" class="text-[10px] text-gray-500 hover:text-white underline">편집 모드 전환</button>
          </div>
          <div id="summary-viewer" class="markdown-body min-h-[300px] bg-white/5 border border-white/5 rounded-2xl p-6 overflow-y-auto"></div>
          <textarea id="edit-summary" class="hidden w-full h-[400px] bg-obsidian-900 border border-purple-500/30 rounded-2xl px-5 py-4 outline-none resize-none leading-relaxed text-gray-300 font-mono text-sm"></textarea>
        </div>
        
        <div class="flex gap-4">
          <button id="save-edit-btn" class="flex-1 bg-white text-black py-4 rounded-xl font-bold hover:bg-gray-200 transition-all">변경사항 저장</button>
          <button id="open-pdf-btn" class="flex-1 bg-obsidian-700 py-4 rounded-xl font-bold hover:bg-obsidian-600 transition-all border border-white/10">PDF 읽기</button>
        </div>
      </div>
    </div>
  </div>

  <div id="settings-modal" class="fixed inset-0 bg-black/95 backdrop-blur-xl z-[70] hidden flex items-center justify-center p-6">
    <div class="bg-obsidian-800 border border-white/10 rounded-3xl w-full max-w-2xl p-10 shadow-2xl">
      <div class="flex justify-between items-center mb-8"><h2 class="text-2xl font-bold font-display text-white">AI Configuration</h2><button onclick="closeSettings()" class="text-gray-500 hover:text-white">&times;</button></div>
      <div class="space-y-6">
        <div class="grid grid-cols-2 gap-4">
          <div><label class="block text-xs text-gray-500 mb-2 font-bold">Provider</label><select id="api-provider" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 outline-none text-white"><option value="gemini">Google Gemini</option><option value="openai">OpenAI ChatGPT</option></select></div>
          <div><label class="block text-xs text-gray-500 mb-2 font-bold">Model Name</label><input type="text" id="api-model" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 outline-none text-white" placeholder="gemini-1.5-pro" /></div>
        </div>
        <div><label class="block text-xs text-gray-500 mb-2 font-bold">API Key</label><input type="password" id="api-key-input" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 outline-none text-white" /></div>
        <div><label class="block text-xs text-gray-500 mb-2 font-bold">System Prompt (에디터 역할 수행)</label><textarea id="api-prompt" rows="8" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 outline-none resize-none text-sm text-gray-300 font-mono leading-snug"></textarea></div>
        <div class="flex items-end"><button id="save-settings-btn" class="w-full bg-purple-600 py-4 rounded-xl font-bold text-white">마법 설정 저장</button></div>
      </div>
    </div>
  </div>

  <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 px-8 py-4 rounded-2xl bg-white text-black font-bold shadow-2xl z-[100] transition-all opacity-0 pointer-events-none scale-90"></div>

  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    let db, scenarios = [], currentEditId = null;
    let isEditMode = false;
    let selectedFilter = { type: 'all', value: null };

    async function openDB() {
      return new Promise(r => {
        const req = indexedDB.open('arcane-shelf-v3', 1);
        req.onupgradeneeded = e => e.target.result.createObjectStore('scenarios', { keyPath: 'id' });
        req.onsuccess = e => r(e.target.result);
      });
    }

    async function dbSave(item) {
      const tx = db.transaction('scenarios', 'readwrite');
      tx.objectStore('scenarios').put(item);
      return new Promise(r => tx.oncomplete = r);
    }

    async function dbGetAll() {
      const tx = db.transaction('scenarios', 'readonly');
      const req = tx.objectStore('scenarios').getAll();
      return new Promise(r => req.onsuccess = () => r(req.result));
    }

    async function handleFiles(files) {
      if (!files || files.length === 0) return;
      showToast(`${files.length}개의 문서를 분석 중...`);

      for (const file of Array.from(files)) {
        try {
          const arrayBuffer = await file.arrayBuffer();
          const pdf = await pdfjsLib.getDocument({ data: new Uint8Array(arrayBuffer) }).promise;
          const page = await pdf.getPage(1);
          const viewport = page.getViewport({ scale: 0.8 });
          const canvas = document.createElement('canvas');
          const ctx = canvas.getContext('2d');
          canvas.height = viewport.height; canvas.width = viewport.width;
          await page.render({ canvasContext: ctx, viewport }).promise;

          const base64PDF = await new Promise(r => {
            const reader = new FileReader();
            reader.onload = () => r(reader.result);
            reader.readAsDataURL(file);
          });

          const scenario = {
            id: crypto.randomUUID(),
            title: file.name.replace('.pdf', ''),
            rule: 'Unknown', author: 'Unknown', players: '-', tags: [], summary: 'AI 요약을 실행하여 큐레이팅 결과를 확인하세요.',
            thumbnail: canvas.toDataURL('image/jpeg', 0.7),
            pdfData: base64PDF,
            addedAt: Date.now()
          };

          await dbSave(scenario);
          scenarios.unshift(scenario);
          renderGrid();
          renderSidebar();
        } catch (e) {
          showToast(`오류: ${file.name}`, 'error');
        }
      }
      showToast('입고 완료!', 'success');
      document.getElementById('file-input').value = "";
    }

    function renderGrid() {
      const grid = document.getElementById('scenario-grid');
      const term = document.getElementById('search-input').value.toLowerCase();
      
      let filtered = scenarios.filter(s => s.title.toLowerCase().includes(term));
      
      if (selectedFilter.type === 'rule') {
          filtered = filtered.filter(s => s.rule === selectedFilter.value);
      } else if (selectedFilter.type === 'tag') {
          filtered = filtered.filter(s => s.tags.includes(selectedFilter.value));
      }

      grid.innerHTML = filtered.map(s => `
        <div class="shelf-card group cursor-pointer" onclick="openEdit('${s.id}')">
          <div class="relative aspect-[3/4] overflow-hidden rounded-2xl bg-obsidian-700 shadow-xl">
            <img src="${s.thumbnail}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-1000" />
            <div class="absolute inset-0 bg-gradient-to-t from-black/95 via-black/40 to-transparent flex flex-col justify-end p-5 opacity-100 group-hover:opacity-100 transition-opacity">
               <p class="text-[9px] text-purple-400 font-bold uppercase tracking-wider mb-1">${s.rule}</p>
               <h3 class="text-white font-bold text-sm leading-tight line-clamp-2">${s.title}</h3>
            </div>
          </div>
        </div>
      `).join('');
    }

    function renderSidebar() {
      const container = document.getElementById('sidebar-filters');
      const rules = [...new Set(scenarios.map(s => s.rule))].filter(r => r && r !== 'Unknown');
      const tags = [...new Set(scenarios.flatMap(s => s.tags))].filter(t => t);

      let html = `
        <div>
          <h4 class="text-[10px] uppercase tracking-widest text-gray-500 font-bold mb-4">View All</h4>
          <button onclick="setFilter('all')" class="w-full text-left text-sm py-2 px-3 rounded-lg hover:bg-white/5 transition-all ${selectedFilter.type === 'all' ? 'bg-purple-600/20 text-purple-400' : 'text-gray-400'}">전체 보기 (${scenarios.length})</button>
        </div>
      `;

      if (rules.length > 0) {
        html += `<div><h4 class="text-[10px] uppercase tracking-widest text-gray-500 font-bold mb-4 mt-8">By System</h4><div class="flex flex-col gap-1">`;
        rules.forEach(r => {
          html += `<button onclick="setFilter('rule', '${r}')" class="text-left text-sm py-2 px-3 rounded-lg hover:bg-white/5 transition-all ${selectedFilter.value === r ? 'bg-purple-600/20 text-purple-400' : 'text-gray-400'}">${r}</button>`;
        });
        html += `</div></div>`;
      }

      if (tags.length > 0) {
        html += `<div><h4 class="text-[10px] uppercase tracking-widest text-gray-500 font-bold mb-4 mt-8">Popular Tags</h4><div class="flex flex-wrap gap-2">`;
        tags.slice(0, 15).forEach(t => {
          html += `<button onclick="setFilter('tag', '${t}')" class="text-[10px] px-2 py-1 rounded-md border border-white/10 hover:border-purple-500 transition-all ${selectedFilter.value === t ? 'bg-purple-500 text-white border-purple-500' : 'text-gray-500'}">#${t}</button>`;
        });
        html += `</div></div>`;
      }

      container.innerHTML = html;
    }

    function setFilter(type, value = null) {
      selectedFilter = { type, value };
      renderGrid();
      renderSidebar();
    }

    function openEdit(id) {
      currentEditId = id;
      const s = scenarios.find(item => item.id === id);
      
      document.getElementById('edit-title').value = s.title;
      document.getElementById('edit-thumb').src = s.thumbnail;
      document.getElementById('edit-rule').value = s.rule;
      document.getElementById('edit-author').value = s.author;
      document.getElementById('edit-players').value = s.players;
      document.getElementById('edit-tags').value = s.tags.join(', ');
      document.getElementById('edit-summary').value = s.summary;
      
      // 마크다운 렌더링 적용
      renderMarkdown(s.summary);
      
      // 모드 초기화
      isEditMode = false;
      document.getElementById('summary-viewer').classList.remove('hidden');
      document.getElementById('edit-summary').classList.add('hidden');
      document.getElementById('toggle-summary-btn').innerText = "편집 모드 전환";

      document.getElementById('open-pdf-btn').onclick = () => {
          const blob = dataURLtoBlob(s.pdfData);
          window.open(URL.createObjectURL(blob), '_blank');
      };
      document.getElementById('edit-modal').classList.remove('hidden');
    }

    function renderMarkdown(text) {
      const viewer = document.getElementById('summary-viewer');
      viewer.innerHTML = marked.parse(text || "");
    }

    function toggleSummaryMode() {
      isEditMode = !isEditMode;
      const viewer = document.getElementById('summary-viewer');
      const editor = document.getElementById('edit-summary');
      const btn = document.getElementById('toggle-summary-btn');

      if (isEditMode) {
        editor.classList.remove('hidden');
        viewer.classList.add('hidden');
        btn.innerText = "미리보기 모드 전환";
      } else {
        editor.classList.add('hidden');
        viewer.classList.remove('hidden');
        renderMarkdown(editor.value);
        btn.innerText = "편집 모드 전환";
      }
    }

    async function generateAISummary(id) {
      const config = {
        key: localStorage.getItem('arcane_key'),
        provider: localStorage.getItem('arcane_provider') || 'gemini',
        model: localStorage.getItem('arcane_model') || 'gemini-1.5-pro',
        prompt: localStorage.getItem('arcane_prompt') || ''
      };

      if (!config.key) { showToast('API 키를 입력해주세요.', 'error'); return openSettings(); }
      const sc = scenarios.find(s => s.id === id);
      showToast('전문 텍스트를 추출하고 있습니다...');

      try {
        const blob = dataURLtoBlob(sc.pdfData);
        const arrayBuffer = await blob.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({ data: new Uint8Array(arrayBuffer) }).promise;
        let fullText = "";
        const maxPages = Math.min(pdf.numPages, 20);
        for (let i = 1; i <= maxPages; i++) {
          const page = await pdf.getPage(i);
          const textContent = await page.getTextContent();
          fullText += textContent.items.map(it => it.str).join(' ') + "\n";
        }

        showToast('AI 에디터가 서적을 분석 중입니다...');
        const prompt = `${config.prompt}\n\n시나리오 원본 데이터:\n${fullText.slice(0, 20000)}`;

        let result = "";
        if (config.provider === 'gemini') {
          const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${config.model}:generateContent?key=${config.key}`, {
            method: 'POST', body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
          });
          const d = await res.json();
          result = d.candidates[0].content.parts[0].text;
        } else {
          const res = await fetch('https://api.openai.com/v1/chat/completions', {
            method: 'POST', headers: { 'Authorization': `Bearer ${config.key}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ model: config.model, messages: [{ role: 'user', content: prompt }] })
          });
          const d = await res.json();
          result = d.choices[0].message.content;
        }
        
        document.getElementById('edit-summary').value = result;
        renderMarkdown(result);
        showToast('큐레이팅 완료!', 'success');
      } catch (e) { showToast('분석 실패', 'error'); }
    }

    async function saveEdit() {
      const idx = scenarios.findIndex(s => s.id === currentEditId);
      scenarios[idx].title = document.getElementById('edit-title').value; // 제목 수정 반영
      scenarios[idx].rule = document.getElementById('edit-rule').value;
      scenarios[idx].author = document.getElementById('edit-author').value;
      scenarios[idx].players = document.getElementById('edit-players').value;
      scenarios[idx].tags = document.getElementById('edit-tags').value.split(',').map(t => t.trim()).filter(t => t);
      scenarios[idx].summary = document.getElementById('edit-summary').value;
      
      await dbSave(scenarios[idx]);
      renderGrid(); 
      renderSidebar();
      closeEdit();
      showToast('라이브러리가 갱신되었습니다.');
    }

    function dataURLtoBlob(dataurl) {
        var arr = dataurl.split(','), mime = arr[0].match(/:(.*?);/)[1],
            bstr = atob(arr[1]), n = bstr.length, u8arr = new Uint8Array(n);
        while(n--) u8arr[n] = bstr.charCodeAt(n);
        return new Blob([u8arr], {type:mime});
    }

    function closeEdit() { document.getElementById('edit-modal').classList.add('hidden'); }
    function openSettings() {
      document.getElementById('api-key-input').value = localStorage.getItem('arcane_key') || '';
      document.getElementById('api-provider').value = localStorage.getItem('arcane_provider') || 'gemini';
      document.getElementById('api-model').value = localStorage.getItem('arcane_model') || 'gemini-1.5-pro';
      document.getElementById('api-prompt').value = localStorage.getItem('arcane_prompt') || '';
      document.getElementById('settings-modal').classList.remove('hidden');
    }
    function closeSettings() { document.getElementById('settings-modal').classList.add('hidden'); }
    function saveSettings() {
      localStorage.setItem('arcane_key', document.getElementById('api-key-input').value);
      localStorage.setItem('arcane_provider', document.getElementById('api-provider').value);
      localStorage.setItem('arcane_model', document.getElementById('api-model').value);
      localStorage.setItem('arcane_prompt', document.getElementById('api-prompt').value);
      closeSettings(); showToast('설정이 저장되었습니다.', 'success');
    }

    function showToast(msg, type = 'info') {
      const t = document.getElementById('toast');
      t.innerText = msg;
      t.className = `fixed bottom-10 left-1/2 -translate-x-1/2 px-8 py-4 rounded-2xl font-bold shadow-2xl z-[100] transition-all opacity-100 scale-100 ${type === 'error' ? 'bg-red-500 text-white' : (type === 'success' ? 'bg-purple-600 text-white' : 'bg-white text-black')}`;
      setTimeout(() => { t.classList.replace('opacity-100', 'opacity-0'); }, 3000);
    }

    document.getElementById('file-input').onchange = (e) => handleFiles(e.target.files);
    document.getElementById('search-input').oninput = renderGrid;
    document.getElementById('settings-btn').onclick = openSettings;
    document.getElementById('save-settings-btn').onclick = saveSettings;
    document.getElementById('save-edit-btn').onclick = saveEdit;
    document.getElementById('ai-btn').onclick = () => generateAISummary(currentEditId);

    (async () => {
      db = await openDB();
      scenarios = await dbGetAll();
      scenarios.sort((a,b) => b.addedAt - a.addedAt);
      renderGrid();
      renderSidebar();
    })();
  </script>
</body>
</html>
